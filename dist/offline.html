<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phoenix Command - Offline</title>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: Inter, system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      text-align: center;
    }
    h1 { font-family: Cinzel, Georgia, serif; color: #D4AF37; }
    p { color: #999; max-width: 300px; }
    button {
      background: linear-gradient(135deg, #FF1A1A, #C81414);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div>
    <h1>OFFLINE</h1>
    <p>Phoenix Command needs an internet connection. Check your connection and try again.</p>
    <button onclick="location.reload()">Retry</button>
  </div>
</body>
</html>
